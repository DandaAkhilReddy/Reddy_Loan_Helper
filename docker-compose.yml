services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reddy_loan
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:dev@db:5432/reddy_loan
      JWT_SECRET: local-dev-secret
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      - db

volumes:
  pgdata:
