[phases.setup]
nixPkgs = ["python312", "nodejs_22"]

[phases.install]
cmds = ["pip install -r requirements.txt", "cd src/frontend && npm ci"]

[phases.build]
cmds = ["cd src/frontend && npm run build && echo 'Frontend built' && ls -la dist/"]

[start]
cmd = "uvicorn src.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
